on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: build + test

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

# Cancel superseded runs on the same ref to avoid wasting CI minutes on stale
# pushes. Never cancel main: cancel-in-progress is scoped off so a push to
# main can't kill a deploy that's already mid-flight from an earlier push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@b619ad904e146bb2e5a34e01fabb1565badc1df3 # cargo-nextest
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo nextest run --workspace --profile ci
      - name: Run doctests
        run: cargo test -p ingredient --doc
  wasm-tests:
    name: wasm tests (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          target: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
      - name: Install Chrome for headless wasm tests
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2
      - name: Run wasm-bindgen tests
        run: wasm-pack test --headless --chrome ingredient-wasm
  coverage:
    name: code coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@3a7f9c7e491f886d38a27cc2e084e2d9218068c6 # cargo-llvm-cov
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Generate code coverage
        run: |
          cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info \
            --exclude food-cli --exclude food-app --exclude ingredient-wasm
      - name: Upload to codecov.io
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          # The `latest` CLI channel can serve a checksum/signature pair that
          # fails GPG verification (CDN skew); pin so uploads are reproducible.
          version: v11.3.0
  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: "1.88"
      - name: Check the published crate builds on its declared MSRV
        # 1.88 is the workspace floor: edition 2024 + let-chains (from clippy's
        # collapsible_if) stabilized there. Default features only.
        run: cargo +1.88 check -p ingredient
  deny:
    name: supply-chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          # Unmaintained-crate advisories are informational (see deny.toml);
          # a security vulnerability (RUSTSEC "vulnerability" category) still
          # fails the job.
          command-arguments: "-A unmaintained"
  fuzz:
    name: fuzz (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: nightly
          components: rust-src
          # cargo-fuzz defaults to the musl target on Linux, where ASan is
          # incompatible with the static libc. Build/run against gnu instead.
          target: x86_64-unknown-linux-gnu
      - uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2
        with:
          tool: cargo-fuzz
      - name: Smoke-fuzz each ingredient-parser target (30s each)
        # Short run to catch crashes/panics on PRs; deep runs are manual/scheduled.
        working-directory: ingredient-parser
        run: |
          for target in from_str parse_amount rich_text; do
            cargo +nightly fuzz run "$target" --target x86_64-unknown-linux-gnu -- -max_total_time=30 -rss_limit_mb=4096
          done
      - name: Smoke-fuzz each recipe-scraper target (30s each)
        # Skipped if the fuzz crate doesn't exist yet, so this step stays green
        # regardless of landing order with the PR that adds it.
        if: hashFiles('recipe-scraper/fuzz/Cargo.toml') != ''
        working-directory: recipe-scraper
        run: |
          for target in scrape; do
            cargo +nightly fuzz run "$target" --target x86_64-unknown-linux-gnu -- -max_total_time=30 -rss_limit_mb=4096
          done
  bench:
    name: benchmarks (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - name: Run benchmarks once (criterion --test) so they keep compiling and executing
        run: cargo bench -p ingredient --features bench -- --test
  demo-site:
    name: demo-site (build + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: demo-site/pnpm-lock.yaml
      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
      # `tsc` (inside the build) typechecks the demo against the freshly
      # generated wasm `.d.ts`, so a Tsify type change can't merge green and
      # only fail on the post-merge deploy.
      - name: Build site
        run: make build-demo-site
      - name: Lint
        run: pnpm run lint
        working-directory: demo-site
  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: demo-site/pnpm-lock.yaml
      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
      - name: Build site
        run: make build-demo-site
      - name: Publish
        uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca # v1.5.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: 9f10f078d35d86c78dedece2300a6b88
          projectName: ingredient
          directory: demo-site/dist/
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
