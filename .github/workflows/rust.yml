on:
  push:
  pull_request:
    branches: [main]

name: build + test

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose
  coverage:
    name: code coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Generate code coverage
        run: |
          cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info \
            --exclude food_cli --exclude food_ui --exclude food_web --exclude ingredient-wasm
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
  deny:
    name: cargo-deny (supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.85"
      - name: Check the published crate builds on its declared MSRV
        # Default features only — the `bench` feature pulls criterion, which needs 1.86.
        run: cargo +1.85 check -p ingredient
  fuzz:
    name: fuzz (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-src
      - uses: taiki-e/install-action@cargo-fuzz
      - name: Smoke-fuzz each target (30s each)
        # Short run to catch crashes/panics on PRs; deep runs are manual/scheduled.
        working-directory: ingredient-parser
        run: |
          for target in from_str parse_amount rich_text; do
            cargo +nightly fuzz run "$target" -- -max_total_time=30 -rss_limit_mb=4096
          done
  bench:
    name: benchmarks (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Run benchmarks once (criterion --test) so they keep compiling and executing
        run: cargo bench -p ingredient --features bench -- --test
  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: jetli/wasm-pack-action@v0.4.0
      - name: Build site
        run: make build-demo-site
      - name: Publish
        uses: cloudflare/pages-action@v1.5.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: 9f10f078d35d86c78dedece2300a6b88
          projectName: ingredient
          directory: demo-site/dist/
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
